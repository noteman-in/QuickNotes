<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>QuickNotes</title>

    <style>
        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

        }

        body {

            width: 390px;

            background: white;

            overflow: hidden;

        }

        .container {

            padding: 18px;

        }

        .header {

            background: #111827;

            border-radius: 18px;

            padding: 18px;

            color: white;

            box-shadow: 0 10px 30px rgba(0, 0, 0, .12);

        }

        .header h1 {

            font-size: 28px;

            font-weight: 800;

            letter-spacing: -1px;

        }

        .footer-link {

            display: inline-block;

            color: #9ca3af;

            font-size: 14px;

            font-weight: 600;

            text-decoration: none;

            transition: .2s;

        }

        .footer-link:hover {

            color: #4f46e5;

        }

        .header p {

            margin-top: 4px;

            font-size: 13px;

            color: #cbd5e1;

        }

        #open {

            margin-top: 16px;

            width: 100%;

            height: 46px;

            border: none;

            border-radius: 12px;

            background: white;

            color: #111827;

            font-size: 15px;

            font-weight: 700;

            cursor: pointer;

            transition: .2s;

        }

        #open:hover {

            transform: translateY(-1px);

            box-shadow: 0 8px 20px rgba(255, 255, 255, .15);

        }

        .section {

            margin-top: 22px;

            font-size: 12px;

            font-weight: 700;

            letter-spacing: 1px;

            color: #94a3b8;

            text-transform: uppercase;

        }

        .preview {

            margin-top: 10px;

            background: white;

            border-radius: 18px;

            padding: 18px;

            box-shadow: 0 4px 18px rgba(15, 23, 42, .08);

        }

        #previewText {

            font-size: 15px;

            font-weight: 500;

            line-height: 1.7;

            color: #111827;

            height: 170px;

            overflow-y: auto;

            padding-right: 6px;

        }

        #previewText::-webkit-scrollbar {

            width: 5px;

        }

        #previewText::-webkit-scrollbar-thumb {

            background: #d1d5db;

            border-radius: 50px;

        }

        .meta {

            margin-top: 18px;

            display: flex;

            justify-content: space-between;

            align-items: center;

        }

        .folder {

            background: #eef2ff;

            color: #3730a3;

            padding: 6px 12px;

            border-radius: 999px;

            font-size: 12px;

            font-weight: 700;

            max-width: 180px;

            overflow: hidden;

            text-overflow: ellipsis;

            white-space: nowrap;

        }

        .date {

            font-size: 12px;

            color: #9ca3af;

        }

        .actions {

            margin-top: 16px;

            display: flex;

            gap: 10px;

        }

        #openFolder {

            flex: 1;

            height: 44px;

            border: none;

            border-radius: 12px;

            background: #111827;

            color: white;

            font-size: 14px;

            font-weight: 700;

            cursor: pointer;

            transition: .2s;

        }

        #openFolder:hover {

            background: #1f2937;

        }

        #delete {

            width: 48px;

            height: 44px;

            display: flex;

            align-items: center;

            justify-content: center;

            border: none;

            border-radius: 12px;

            background: #ef4444;

            color: white;

            cursor: pointer;

            transition: .2s;

            box-shadow: 0 8px 18px rgba(239, 68, 68, .25);

        }

        #delete:hover {

            background: #dc2626;

            transform: translateY(-1px);

        }

        #delete svg {

            width: 19px;

            height: 19px;

        }

        button:disabled {

            opacity: .45;

            cursor: not-allowed;

        }

        .footer {

            margin-top: 20px;

            padding-bottom: 6px;

            text-align: center;

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="header">

            <h1>QuickNotes</h1>

            <p>Capture • Organize • Revise</p>

            <button id="open">

                Open Dashboard

            </button>

        </div>

        <div class="section">

            Recently Saved

        </div>

        <div class="preview">

            <div id="previewText">

                No recently saved note.

            </div>

            <div class="meta">

                <div id="previewFolder" class="folder">

                    No Folder

                </div>

                <div id="previewDate" class="date">

                    --

                </div>

            </div>

            <div class="actions">

                <button id="openFolder">

                    Open Folder

                </button>

                <button id="delete" title="Delete Note">

                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                        <polyline points="3 6 5 6 21 6"></polyline>

                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>

                        <path d="M10 11v6"></path>

                        <path d="M14 11v6"></path>

                        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>

                    </svg>

                </button>

            </div>

        </div>

        <div class="footer">
            <a class="footer-link"
                href="https://docs.google.com/forms/d/e/1FAIpQLScgH8j-QsUwXaCll_Dr8wvC7dHZP9OHwuyYwyk5AmHg8UUTOQ/viewform?usp=header"
                target="_blank" rel="noopener noreferrer">
                Need help? Contact us
            </a>
        </div>

    </div>

    <script src="popup/popup.js"></script>

</body>

</html>
